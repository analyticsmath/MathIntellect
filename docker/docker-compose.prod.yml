# Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# Requires: .env.production in project root or backend/.env.production

services:

  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-math_intel_dashboard}
      POSTGRES_USER:     ${DB_USER:-prod_user}
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS is required}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER:-prod_user} -d ${DB_NAME:-math_intel_dashboard}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 15s

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context:    ..
      dockerfile: docker/backend.Dockerfile
      target:     production
    restart: unless-stopped
    environment:
      NODE_ENV:     production
      PORT:         5000
      DATABASE_URL: postgresql://${DB_USER:-prod_user}:${DB_PASS}@db:5432/${DB_NAME:-math_intel_dashboard}
      JWT_SECRET:   ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://frontend:80}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    healthcheck:
      test:         ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval:     15s
      timeout:      5s
      retries:      3
      start_period: 25s

  # ── Frontend (Nginx) ─────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ..
      dockerfile: docker/frontend.Dockerfile
      target:     production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api/v1}
        VITE_WS_URL:  ${VITE_WS_URL:-http://localhost:5000}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test:         ["CMD-SHELL", "wget -qO- http://localhost:80/nginx-health || exit 1"]
      interval:     15s
      timeout:      3s
      retries:      3
      start_period: 10s

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
