services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ../backend/.env
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/math_intel_dashboard
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../backend/src:/usr/src/app/src
    networks:
      - app-network

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "5173:80"          # nginx listens on 80; expose as 5173 on host
    environment:
      - VITE_API_URL=/api/v1   # relative — nginx proxies /api/ to backend
    depends_on:
      - backend
    networks:
      - app-network

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: math_intel_dashboard
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d math_intel_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
